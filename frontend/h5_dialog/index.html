<!DOCTYPE html>
<!--
  DEPRECATED: Legacy H5 prototype UI. Do not extend for new gameplay.
  New clients must use the generic Client Protocol (P53+) and WorldCommand pipeline.
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>先驱者</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>先驱者</h1>
    <div id="turn-info">回合 0</div>
  </header>
  <main id="chat-area"></main>
  <section id="state-panel">
    <div id="state-summary"></div>
    <div id="knowledge-panel">
      <div id="actor-knowledge"></div>
      <div id="recipient-knowledge"></div>
    </div>
    <div id="debug-panel"></div>
  </section>
  <footer>
    <div id="quick-actions"></div>
    <form id="input-form">
      <input type="text" id="input-text" placeholder="输入指令..." autocomplete="off" maxlength="128">
      <button type="submit">发送</button>
    </form>
  </footer>
</div>
<script src="/app.js"></script>
</body>
</html>
