<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>先驱者 — 可玩界面</title>
<link rel="stylesheet" href="/style.css?v=p40_execution_20260519">
</head>
<body>

<div id="portrait-overlay">
  <div class="portrait-icon">↻</div>
  <p>请旋转手机，横屏游玩</p>
</div>

<div id="app">
  <header class="topbar">
    <div class="topbar-left">
      <span id="phase-label">第1夜 · 黄昏</span>
    </div>
    <div class="topbar-center">
      <span id="danger-label" class="danger-tag">危险：安全</span>
      <span id="goal-label" class="goal-tag">目标：探索世界</span>
    </div>
    <div class="topbar-right">
      <span id="turn-badge">回合 0</span>
    </div>
  </header>

  <main class="layout">
    <section class="panel left-panel" aria-label="世界对象">
      <h2 class="panel-title">世界</h2>
      <div id="object-grid" class="object-grid"></div>
    </section>

    <section class="panel center-panel" aria-label="局势">
      <h2 class="panel-title">局势</h2>
      <div id="situation-text" class="situation-text"></div>
      <div id="recent-events" class="recent-events"></div>
      <div id="object-detail" class="object-detail hidden"></div>
    </section>

    <section class="panel right-panel" aria-label="行动与思考">
      <h2 class="panel-title">行动</h2>
      <div id="action-list" class="action-list"></div>
      <div id="companion-card" class="companion-card">
        <h3 class="card-title">同伴思考</h3>
        <div id="companion-content" class="card-content"></div>
      </div>
      <div id="execution-card" class="execution-card">
        <h3 class="card-title">执行状态</h3>
        <div id="execution-content" class="card-content"></div>
      </div>
    </section>
  </main>

  <footer class="bottombar">
    <button id="btn-wait" type="button" class="global-btn">等待</button>
    <button id="btn-teach" type="button" class="global-btn">教同伴</button>
    <button id="btn-knowledge" type="button" class="global-btn">知识</button>
    <button id="btn-log" type="button" class="global-btn">日志</button>
    <button id="btn-reset" type="button" class="global-btn danger-btn">重开</button>
  </footer>
</div>

<div id="log-drawer" class="drawer hidden">
  <div class="drawer-header">
    <div class="drawer-tabs">
      <button class="drawer-tab active" data-tab="events">事件</button>
      <button class="drawer-tab" data-tab="knowledge">知识</button>
      <button class="drawer-tab" data-tab="system">系统</button>
    </div>
    <button id="drawer-close" type="button" class="drawer-close">✕</button>
  </div>
  <div class="drawer-body">
    <div id="drawer-events" class="drawer-panel"></div>
    <div id="drawer-knowledge" class="drawer-panel hidden"></div>
    <div id="drawer-system" class="drawer-panel hidden"></div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="/app.js?v=p40_execution_20260519"></script>
</body>
</html>
