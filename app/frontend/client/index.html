<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>先驱者客户端</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app" class="game-shell">
    <canvas id="gameCanvas"></canvas>

    <header class="top-hud">
      <section class="status-panel">
        <div class="mode-badge" id="modeBadge">连接中…</div>
        <div class="status-line" id="sessionLine">—</div>
        <div class="status-line" id="versionLine">—</div>
        <div class="status-line" id="actorLine">—</div>
      </section>
      <section class="quest-panel" id="questPanel">
        <div class="quest-title">世界状态</div>
        <div class="quest-body" id="questBody">等待后端数据…</div>
      </section>
      <div class="zoom-controls" id="zoomControls">
        <button class="zoom-btn" id="zoomOutBtn" title="缩小">−</button>
        <button class="zoom-btn" id="zoomInBtn" title="放大">＋</button>
      </div>
      <button class="follow-btn" id="followBtn" title="切换镜头跟随">跟随：关</button>
      <button class="reset-btn" id="resetBtn" title="重置世界">↻ 重置</button>
    </header>

    <aside class="command-panel" id="commandPanel">
      <div class="panel-title">可用行动</div>
      <div class="command-list" id="commandList"></div>
    </aside>

    <section class="event-log" id="eventLog">
      <div class="log-title">事件日志</div>
      <div class="log-entries" id="logEntries"></div>
    </section>

    <!-- 备用虚拟摇杆：主操作已改为拖拽地图、滚轮缩放、双击地块寻路 -->
    <div class="joystick-zone" id="joystickZone">
      <div class="joystick-base" id="joystickBase" aria-label="移动摇杆">
        <div class="joystick-ring"></div>
        <div class="joystick-thumb" id="joystickThumb"></div>
      </div>
      <div class="joystick-label">备用移动</div>
    </div>

    <!-- WASD 提示：电脑显示，手机隐藏 -->
    <div class="wasd-hint" id="wasdHint">
      <div class="wasd-row"><span class="wasd-key">W</span></div>
      <div class="wasd-row"><span class="wasd-key">A</span><span class="wasd-key">S</span><span class="wasd-key">D</span></div>
      <div class="wasd-label">备用移动</div>
    </div>

    <details class="debug-panel" id="debugPanel">
      <summary>调试信息</summary>
      <pre id="debugPre"></pre>
    </details>

    <div id="toastContainer"></div>
  </div>
  <script src="/sprites/grass.js"></script>
  <script src="/sprites/forest.js"></script>
  <script src="/sprites/water.js"></script>
  <script src="/sprites/sand.js"></script>
  <script src="/sprites/mountain.js"></script>
  <script src="/sprites/plain.js"></script>
  <script src="/sprites/unknown.js"></script>
  <script src="/sprites/rocky.js"></script>
  <script src="/sprites/camp.js"></script>
  <script src="/sprites/tree.js"></script>
  <script src="/sprites/berry.js"></script>
  <script src="/sprites/player.js"></script>
  <script src="/sprites/npc.js"></script>
  <script src="/sprites/wolf.js"></script>
  <script src="/sprites/campfire.js"></script>
  <script src="/i18n.js"></script>
  <script src="/app.js"></script>
</body>
</html>
